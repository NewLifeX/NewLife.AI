<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NewLife.ChatAI</title>
    <link rel="stylesheet" href="/css/app.css" />
    <!-- 代码高亮主题 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" id="hlThemeLight" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" id="hlThemeDark" disabled />
    <!-- KaTeX 数学公式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
</head>
<body>
<div class="app" id="app">
    <!-- ═══════ 侧边栏 ═══════ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="sidebar-toggle" id="sidebarToggle" title="收起侧边栏">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="btn-new-chat" id="newConversationBtn" title="新建对话">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                <span class="btn-text">新建对话</span>
            </button>
        </div>
        <div class="conversation-list" id="conversationList"></div>
        <div class="sidebar-footer">
            <button class="profile-btn" id="profileBtn">
                <span class="avatar" id="userAvatar">U</span>
                <span class="btn-text username" id="userName">用户</span>
            </button>
            <div class="profile-menu hidden" id="profileMenu">
                <div class="menu-item" id="menuSettings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                    设置
                </div>
            </div>
        </div>
    </aside>

    <!-- ═══════ 主内容区 ═══════ -->
    <main class="main" id="mainContent">
        <!-- 顶部栏 -->
        <header class="topbar">
            <button class="sidebar-open-btn hidden" id="sidebarOpenBtn" title="展开侧边栏">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div class="model-selector" id="modelSelector">
                <button class="model-selector-btn" id="modelSelectorBtn">
                    <svg class="model-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    <span id="currentModelName">选择模型</span>
                    <svg class="caret-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <div class="model-dropdown hidden" id="modelDropdown"></div>
            </div>
        </header>

        <!-- 欢迎页 -->
        <section class="welcome-page" id="welcomePage">
            <div class="welcome-content">
                <div class="welcome-logo">
                    <div class="logo-glow"></div>
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="1.5">
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="24" y2="24">
                                <stop offset="0%" stop-color="#6366f1"/>
                                <stop offset="100%" stop-color="#8b5cf6"/>
                            </linearGradient>
                        </defs>
                        <path d="M12 2a7 7 0 0 1 7 7v1a7 7 0 0 1-14 0V9a7 7 0 0 1 7-7z"/>
                        <path d="M9 12h2m2 0h2"/>
                        <circle cx="9" cy="9" r="1" fill="url(#logoGrad)" stroke="none"/>
                        <circle cx="15" cy="9" r="1" fill="url(#logoGrad)" stroke="none"/>
                        <path d="M8 22h8M12 18v4"/>
                    </svg>
                </div>
                <h1 class="welcome-title">你好，有什么可以帮你？</h1>
                <p class="welcome-subtitle">我是 NewLife.ChatAI，支持多模型对话的智能助手</p>
                <div class="suggested-questions" id="suggestedQuestions"></div>
            </div>
        </section>

        <!-- 对话消息区 -->
        <section class="messages hidden" id="messages">
            <div class="messages-inner" id="messagesInner"></div>
        </section>

        <!-- 回到底部 -->
        <button class="scroll-bottom-btn hidden" id="scrollBottomBtn" title="回到最新消息">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        </button>

        <!-- ═══════ 输入区 ═══════ -->
        <footer class="composer" id="composer">
            <div class="attachment-preview hidden" id="attachmentPreview"></div>
            <div class="composer-card">
                <textarea id="promptInput" rows="1" placeholder="输入你的问题..." maxlength="6000"></textarea>
                <span class="char-count" id="charCount"></span>
                <input type="file" id="fileInput" multiple hidden accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.docx,.txt,.md,.csv,.json" />
                <div class="composer-toolbar">
                    <div class="composer-toolbar-left">
                        <button class="toolbar-btn" id="attachBtn" title="上传附件">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        </button>
                        <div class="thinking-mode-selector" id="thinkingModeSelector">
                            <button class="toolbar-btn thinking-mode-btn" id="thinkingModeBtn" title="思考模式">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 3 2 5.5 4 7 .5.5 1 2 1 3h4c0-1 .5-2.5 1-3 2-1.5 4-4 4-7a7 7 0 0 0-7-7z"/><path d="M10 22h4"/></svg>
                                <span id="thinkingModeLabel">自动</span>
                                <svg class="caret-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                            </button>
                            <div class="thinking-mode-dropdown hidden" id="thinkingModeDropdown">
                                <div class="dropdown-item active" data-mode="0">
                                    <div class="dropdown-item-title">🔄 自动</div>
                                    <div class="dropdown-item-desc">由系统自动决定推理深度</div>
                                </div>
                                <div class="dropdown-item" data-mode="1">
                                    <div class="dropdown-item-title">🧠 思考</div>
                                    <div class="dropdown-item-desc">深度推理，适合复杂问题</div>
                                </div>
                                <div class="dropdown-item" data-mode="2">
                                    <div class="dropdown-item-title">⚡ 快速</div>
                                    <div class="dropdown-item-desc">跳过深度推理，快速返回</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="composer-toolbar-right">
                        <button class="btn-send" id="sendBtn" title="发送 (Enter)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                        <button class="btn-stop hidden" id="stopBtn" title="停止生成">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </footer>
    </main>
</div>

<!-- 移动端侧边栏遮罩 -->
<div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

<!-- ═══════ 设置弹窗 ═══════ -->
<div class="modal-overlay hidden" id="settingsModal">
    <div class="modal settings-modal">
        <div class="modal-header">
            <button class="btn-back" id="settingsBack" title="保存并关闭">←</button>
            <h2>设置</h2>
        </div>
        <div class="modal-body">
            <!-- 通用设置 -->
            <div class="settings-group">
                <h3>通用设置</h3>
                <div class="setting-row">
                    <label>语言</label>
                    <select id="settingLanguage">
                        <option value="zh-CN">中文（简体）</option>
                        <option value="zh-TW">中文（繁体）</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>主题</label>
                    <select id="settingTheme">
                        <option value="light">浅色</option>
                        <option value="dark">深色</option>
                        <option value="system">跟随系统</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>字体大小</label>
                    <div class="range-wrapper">
                        <input type="range" id="settingFontSize" min="14" max="20" value="16" />
                        <span id="fontSizeValue">16px</span>
                    </div>
                </div>
                <div class="setting-row">
                    <label>发送快捷键</label>
                    <select id="settingSendKey">
                        <option value="enter">Enter 发送</option>
                        <option value="ctrl+enter">Ctrl+Enter 发送</option>
                    </select>
                </div>
            </div>
            <!-- 对话设置 -->
            <div class="settings-group">
                <h3>对话设置</h3>
                <div class="setting-row">
                    <label>默认模型</label>
                    <select id="settingDefaultModel"></select>
                </div>
                <div class="setting-row">
                    <label>默认思考模式</label>
                    <select id="settingDefaultThinking">
                        <option value="0">自动</option>
                        <option value="1">思考</option>
                        <option value="2">快速</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>上下文轮数</label>
                    <input type="number" id="settingContextRounds" min="1" max="50" value="10" />
                </div>
                <div class="setting-row setting-row-col">
                    <label>系统提示词</label>
                    <textarea id="settingSystemPrompt" rows="3" placeholder="全局 System Prompt，可为空"></textarea>
                </div>
            </div>
            <!-- 数据与隐私 -->
            <div class="settings-group">
                <h3>数据与隐私</h3>
                <div class="setting-row">
                    <label>导出所有对话</label>
                    <button class="btn-outline" id="settingExport">导出</button>
                </div>
                <div class="setting-row">
                    <label>清除所有对话</label>
                    <button class="btn-danger" id="settingClear">清除</button>
                </div>
                <div class="setting-row">
                    <label>允许用于模型改进</label>
                    <label class="switch">
                        <input type="checkbox" id="settingAllowTraining" />
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <!-- 使用统计 -->
            <div class="settings-group">
                <h3>使用统计</h3>
                <div class="usage-stats" id="usageStats">
                    <div class="usage-stat-card">
                        <div class="usage-stat-value" id="usageConversations">-</div>
                        <div class="usage-stat-label">会话数</div>
                    </div>
                    <div class="usage-stat-card">
                        <div class="usage-stat-value" id="usageMessages">-</div>
                        <div class="usage-stat-label">消息数</div>
                    </div>
                    <div class="usage-stat-card">
                        <div class="usage-stat-value" id="usageTotalTokens">-</div>
                        <div class="usage-stat-label">Token 总量</div>
                    </div>
                </div>
                <div class="setting-row">
                    <label>最近活跃</label>
                    <span class="setting-value" id="usageLastActive">-</span>
                </div>
            </div>
            <!-- API 密钥管理 -->
            <div class="settings-group">
                <h3>API 密钥</h3>
                <p class="settings-desc">通过 API 密钥，外部系统可调用模型服务</p>
                <div class="appkey-list" id="appKeyList"></div>
                <div class="setting-row">
                    <label>创建新密钥</label>
                    <div class="appkey-create-row">
                        <input type="text" id="appKeyName" placeholder="密钥名称" class="appkey-name-input" />
                        <button class="btn-primary" id="appKeyAddBtn">创建</button>
                    </div>
                </div>
            </div>
            <!-- 关于 -->
            <div class="settings-group">
                <h3>关于</h3>
                <div class="setting-row">
                    <label>版本号</label>
                    <span class="setting-value">v1.0.0</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════ 分享弹窗 ═══════ -->
<div class="modal-overlay hidden" id="shareModal">
    <div class="modal share-modal">
        <div class="modal-header">
            <h2>分享对话</h2>
            <button class="btn-close" id="shareClose">✕</button>
        </div>
        <div class="modal-body">
            <p>分享此对话的链接（任何人可通过链接查看）：</p>
            <p class="share-status hidden" id="shareStatus"></p>
            <div class="share-link-row">
                <input type="text" id="shareLinkInput" readonly placeholder="点击下方按钮生成链接" />
                <button class="btn-outline hidden" id="shareCopyBtn">复制</button>
            </div>
            <button class="btn-primary" id="shareCreateBtn">生成链接</button>
        </div>
    </div>
</div>

<!-- ═══════ 反馈弹窗 ═══════ -->
<div class="modal-overlay hidden" id="feedbackModal">
    <div class="modal feedback-modal">
        <div class="modal-header">
            <h2>反馈原因</h2>
            <button class="btn-close" id="feedbackClose">✕</button>
        </div>
        <div class="modal-body">
            <div class="feedback-tags">
                <label class="tag-checkbox"><input type="checkbox" value="回答不准确" /> 回答不准确</label>
                <label class="tag-checkbox"><input type="checkbox" value="回答不完整" /> 回答不完整</label>
                <label class="tag-checkbox"><input type="checkbox" value="格式混乱" /> 格式混乱</label>
                <label class="tag-checkbox"><input type="checkbox" value="内容有害" /> 内容有害</label>
                <label class="tag-checkbox"><input type="checkbox" value="反应太慢" /> 反应太慢</label>
                <label class="tag-checkbox"><input type="checkbox" value="其他" /> 其他</label>
            </div>
            <textarea id="feedbackText" rows="3" placeholder="其他原因（选填）"></textarea>
            <button class="btn-primary" id="feedbackSubmitBtn">提交反馈</button>
        </div>
    </div>
</div>

<!-- ═══════ 图片灯箱 ═══════ -->
<div class="lightbox hidden" id="lightbox">
    <div class="lightbox-backdrop"></div>
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <button class="lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-next" id="lightboxNext">›</button>
    <div class="lightbox-content">
        <img id="lightboxImg" src="" alt="" />
    </div>
    <div class="lightbox-thumbnails" id="lightboxThumbs"></div>
</div>

<!-- ═══════ 确认弹窗 ═══════ -->
<div class="modal-overlay hidden" id="confirmModal">
    <div class="modal confirm-modal">
        <div class="modal-header">
            <h2 id="confirmTitle">确认</h2>
        </div>
        <div class="modal-body">
            <p id="confirmMessage"></p>
            <div class="confirm-buttons">
                <button class="btn-outline" id="confirmCancel">取消</button>
                <button class="btn-danger" id="confirmOk">确定</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast 通知 -->
<div class="toast-container" id="toastContainer"></div>

<!-- CDN 依赖（非模块，需全局可用） -->
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

<!-- 应用入口（ES Module） -->
<script type="module" src="/js/main.js"></script>
</body>
</html>

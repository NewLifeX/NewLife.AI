<!doctype html>
<html lang="zh-CN">
  <head>
    <script>
      // 防暗黑模式白屏闪烁：在 CSS 加载前立即应用 dark 类
      try {
        var s = JSON.parse(localStorage.getItem('newlife-settings') || '{}').state
        var t = s && s.theme
        if (t === 'dark' || (!t || t === 'system') && matchMedia('(prefers-color-scheme:dark)').matches) {
          document.documentElement.classList.add('dark')
        }
      } catch(e) {}
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NewLife - 智能助手</title>
    <!-- 字体已通过 npm 包 local import，见 main.tsx -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

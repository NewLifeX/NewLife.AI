name: publish

on:
  push:
    tags: [ v* ]
  workflow_dispatch:

jobs:
  build-publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
        cache-dependency-path: Web/pnpm-lock.yaml

    - name: Setup dotNET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    - name: Install frontend dependencies
      run: pnpm --dir Web install --frozen-lockfile

    - name: Build frontend
      run: pnpm --dir Web build

    - name: Pack NewLife.AI
      run: dotnet pack -c Release -o out NewLife.AI/NewLife.AI.csproj

    - name: Pack ChatAI
      run: dotnet pack -c Release -o out NewLife.ChatAI/NewLife.ChatAI.csproj

    - name: Publish
      run: dotnet nuget push ./out/*.nupkg --skip-duplicate --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.nugetKey }}
